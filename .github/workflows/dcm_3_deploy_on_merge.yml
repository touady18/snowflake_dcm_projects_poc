name: "DCM 3) Deploy on merge"

# Push on develop : DCM DEPLOY on DEV only
# Push on main    : DCM PLAN + DEPLOY on PROD only
on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'ecommerce/**'    # only triggers if DCM files have changed
  workflow_dispatch:

permissions:
  id-token: write       # Snowflake OIDC authentication
  contents: read
  pull-requests: write  # to post results as a PR comment

env:
  DCM_PROJECT_PATH: ecommerce/

jobs:
  # ── Merge on develop : Deploy on DEV ──────────────────────────────────────
  DEV:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: DCM_DEV
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: Snowflake-Labs/snowflake_dcm_projects/actions/dcm-deploy@v1
        id: deploy
        with:
          target: DCM_DEV
          project-path: ${{ env.DCM_PROJECT_PATH }}
          snowflake-user: ${{ vars.SNOWFLAKE_USER }}  # resolved from the DCM_DEV environment
          allow-drops: "false"          # safety: rejects DROP statements without explicit validation
          post-scripts-path: "post_scripts"
          comment-on-pr: "true"

  # ── Merge on main : Deploy on PROD ────────────────────────────────────────
  PROD:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: DCM_PROD   # ← add "required reviewers" here in GitHub for a manual gate
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: Snowflake-Labs/snowflake_dcm_projects/actions/dcm-plan@v1
        id: plan
        with:
          target: DCM_PROD
          project-path: ${{ env.DCM_PROJECT_PATH }}
          snowflake-user: ${{ vars.SNOWFLAKE_USER }}  # resolved from the DCM_PROD environment
          comment-on-pr: "true"

      - uses: Snowflake-Labs/snowflake_dcm_projects/actions/dcm-deploy@v1
        id: deploy
        with:
          target: DCM_PROD
          project-path: ${{ env.DCM_PROJECT_PATH }}
          snowflake-user: ${{ vars.SNOWFLAKE_USER }}  # resolved from the DCM_PROD environment
          allow-drops: "false"
          post-scripts-path: "post_scripts"
          comment-on-pr: "true"
