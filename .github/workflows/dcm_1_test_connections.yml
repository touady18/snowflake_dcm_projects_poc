name: "DCM 1) Test Connections"

# MANUAL trigger only from GitHub Actions > Run workflow
# Validates Snowflake connectivity before any deployment
on:
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC authentication with Snowflake
  contents: read

env:
  DCM_PROJECT_PATH: ecommerce/                   # path from the repository root

jobs:
  # ── Step 1: read the manifest to extract the list of targets ───────────────
  PARSE_MANIFEST:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.manifest.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - uses: Snowflake-Labs/snowflake_dcm_projects/actions/dcm-parse-manifest@v1
        id: manifest
        with:
          project-path: ${{ env.DCM_PROJECT_PATH }}

  # ── Step 2: connectivity test for each target (DCM_DEV, DCM_PROD) ─────────
  CONNECTION_TEST:
    needs: PARSE_MANIFEST
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJson(needs.PARSE_MANIFEST.outputs.targets) }}
      fail-fast: false    # test all targets even if one fails
    environment: ${{ matrix.target }}   # name = manifest target = GitHub Environment
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: Snowflake-Labs/snowflake_dcm_projects/actions/dcm-connection-test@v1
        id: connect
        with:
          target: ${{ matrix.target }}
          project-path: ${{ env.DCM_PROJECT_PATH }}
          snowflake-user: ${{ vars.SNOWFLAKE_USER }}  # resolved from the job's GitHub Environment
