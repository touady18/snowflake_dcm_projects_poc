manifest_version: 2
type: DCM_PROJECT

# Prérequis bootstrap (une seule fois par compte Snowflake) :
#   CREATE DATABASE IF NOT EXISTS DCM_DB_POC;
#   CREATE SCHEMA  IF NOT EXISTS DCM_DB_POC.PROJECTS;

default_target: DCM_DEV

targets:
  DCM_DEV:
    account_identifier: "JJNSNLN-LE94669" # SELECT CURRENT_ORGANIZATION_NAME() || '-' || CURRENT_ACCOUNT_NAME();
    project_name: DCM_DB_POC.PROJECTS.ECOM_PROJECT_DEV
    project_owner: DCM_DEVELOPER_DEV
    templating_config: DEV

  DCM_PROD:
    account_identifier: "JJNSNLN-LE94669" # SELECT CURRENT_ORGANIZATION_NAME() || '-' || CURRENT_ACCOUNT_NAME();
    project_name: DCM_DB_POC.PROJECTS.ECOM_PROJECT_PROD
    project_owner: DCM_DEPLOYER_PROD
    templating_config: PROD

# Variables Jinja injectées dans les fichiers SQL via {{ variable_name }}
# Résultat :
#   DEV     → ECOM_RAW_WH_DEV
#   PROD    → ECOM_RAW_WH


templating:
  defaults:
    env_suffix: "_DEV"           # suffixe vide par défaut, surchargé par chaque config
    wh_size:   "X-SMALL"
    owner : DCM_DEVELOPER_DEV

  configurations:
    DEV:
      env_suffix: "_DEV"       # Tous les objets auront le suffixe _DEV
      wh_size:   "X-SMALL"
      owner : DCM_DEVELOPER_DEV

    PROD:
      env_suffix: ""           # Pas de suffixe en production
      wh_size:   "SMALL"
      owner : DCM_DEPLOYER_PROD
   
